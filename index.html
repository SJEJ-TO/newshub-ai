<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NewsHub AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app">

    <header>
      <h1>NewsHub AI</h1>
      <p id="date"></p>
    </header>
<div>${sentiment}</div>
  <section class="market" style="display:flex; gap:10px; justify-content:space-around; padding:10px; background:#111; color:white;">
  <div>USD/KRW<br><span id="usd">-</span></div>
  <div>S&P500<br><span id="sp">-</span></div>
  <div>NASDAQ<br><span id="nasdaq">-</span></div>
  <div>KOSPI<br><span id="kospi">-</span></div>
</section>

    <h2>🔥 오늘의 핵심 뉴스</h2>
    <div id="topNews"></div>

    <h2>🤖 AI</h2>
    <div id="aiNews"></div>

    <h2>💰 경제</h2>
    <div id="ecoNews"></div>

    <h2>📈 주식</h2>
    <div id="stockNews"></div>

    <h2>🏛 정치</h2>
    <div id="polNews"></div>

  </div>
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc; color:white; padding:20px;">
  <div id="modalContent" style="background:#111; padding:20px; border-radius:12px;">
  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
