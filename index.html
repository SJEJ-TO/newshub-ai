
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News AI Terminal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .market {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #111;
      font-size: 14px;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: #1a1a1a;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .score {
      color: gold;
      font-weight: bold;
    }

    .section {
      margin-top: 20px;
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    #modalContent {
      background: #111;
      margin: 50px auto;
      padding: 20px;
      width: 80%;
      border-radius: 10px;
    }

    button {
      padding: 8px 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- 시장 데이터 -->
  <div class="market">
    <div>USD/KRW<br><span id="usd">-</span></div>
    <div>S&P500<br><span id="sp">-</span></div>
    <div>NASDAQ<br><span id="nasdaq">-</span></div>
    <div>KOSPI<br><span id="kospi">-</span></div>
  </div>

  <!-- 뉴스 -->
  <div class="container">

    <div class="section">
      <h3>TOP NEWS</h3>
      <div id="topNews"></div>
    </div>

    <div class="section">
      <h3>AI</h3>
      <div id="aiNews"></div>
    </div>

    <div class="section">
      <h3>ECONOMY</h3>
      <div id="ecoNews"></div>
    </div>

    <div class="section">
      <h3>STOCK</h3>
      <div id="stockNews"></div>
    </div>

    <div class="section">
      <h3>POLITICS</h3>
      <div id="polNews"></div>
    </div>

  </div>

  <!-- 모달 -->
  <div id="modal">
    <div id="modalContent">
      <button onclick="closeModal()">닫기</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
